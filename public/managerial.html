<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงานเศษเหล็กที่ทิ้งแล้ว — Iron Drop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="/nav-unified.css" rel="stylesheet">
  <link href="/executive-theme.css" rel="stylesheet">
  <style>
    body {
      background: #eef2f7;
      font-family: 'Prompt', sans-serif;
    }

    .page-header {
      background: linear-gradient(135deg, #1a5c3a, #25a862);
      color: #fff;
      padding: 1.25rem 1.5rem;
      border-radius: 10px 10px 0 0;
    }

    .section-label {
      font-weight: 700;
      color: #1a5c3a;
      border-left: 4px solid #25a862;
      padding-left: .6rem;
      margin-bottom: .75rem;
    }

    /* KPI cards */
    .kpi-card {
      border-radius: 10px;
      padding: 1rem;
    }

    .kpi-num {
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .kpi-label {
      font-size: .78rem;
      color: #6c757d;
      margin-top: .2rem;
    }

    /* Type row */
    .type-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .45rem .75rem;
      border-bottom: 1px solid #f0f0f0;
      font-size: .88rem;
    }

    .type-row:last-child {
      border-bottom: none;
    }

    .type-row .tw {
      font-weight: 700;
      color: #1a5c3a;
      white-space: nowrap;
    }

    /* Group header */
    .grp-hdr {
      padding: .5rem .75rem;
      font-weight: 700;
      font-size: .85rem;
      border-radius: 6px 6px 0 0;
      display: flex;
      justify-content: space-between;
    }

    .grp-hdr.thin {
      background: #e7f3ff;
      color: #084298;
    }

    .grp-hdr.thick {
      background: #fff3e0;
      color: #7c4d00;
    }

    .grp-hdr.special {
      background: #fce4ec;
      color: #880e4f;
    }

    .grp-body {
      border: 1px solid #dee2e6;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
      margin-bottom: .75rem;
    }

    /* Location bar */
    .loc-bar-wrap {
      margin-bottom: .55rem;
    }

    .loc-bar-label {
      font-size: .82rem;
      margin-bottom: .2rem;
      display: flex;
      justify-content: space-between;
    }

    .loc-bar {
      height: 10px;
      border-radius: 5px;
      background: #25a862;
      transition: width .5s;
    }

    /* Sub list */
    .sub-item {
      padding: .6rem .85rem;
      border-bottom: 1px solid #dee2e6;
      cursor: pointer;
    }

    .sub-item:hover {
      background: #f6fdf9;
    }

    .sub-item:last-child {
      border-bottom: none;
    }

    .sub-id {
      font-family: monospace;
      font-size: .7rem;
      color: #6c757d;
    }

    /* Detail modal mobile fullscreen */
    @media (max-width: 575px) {
      body {
        background: #fff;
      }

      .container-lg {
        padding-left: .5rem;
        padding-right: .5rem;
      }

      .py-4 {
        padding-top: .75rem !important;
        padding-bottom: .75rem !important;
      }

      .card.shadow-sm {
        box-shadow: none !important;
      }

      .card {
        border-radius: 0 !important;
        border-left: none !important;
        border-right: none !important;
      }

      .page-header {
        border-radius: 0;
        padding: .85rem 1rem;
      }

      .page-header h5 {
        font-size: .95rem;
      }

      .card-body {
        padding: .75rem;
      }

      .hdr-actions .btn-label {
        display: none;
      }

      .hdr-actions .btn {
        padding: .3rem .55rem;
      }

      #userInfo {
        max-width: 80px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        display: inline-block;
        vertical-align: middle;
      }

      .kpi-num {
        font-size: 1.5rem !important;
      }

      #detailModal .modal-dialog {
        margin: 0;
        max-width: 100%;
        height: 100%;
      }

      #detailModal .modal-content {
        height: 100%;
        border-radius: 0;
      }

      .filter-row {
        flex-direction: column !important;
      }

      .filter-row>* {
        width: 100% !important;
      }
    }
  </style>
</head>

<body>

  <!-- Auth guard -->
  <script>
    (async () => {
      try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) { window.location.replace('/login.html'); return; }
        const u = await r.json();
        if (!['managerial', 'superadmin'].includes(u.role)) { window.location.replace('/login.html'); return; }
        document.getElementById('userInfo').textContent = `${u.fullName} (${u.employeeId})`;
        // Lock branch to user's branch (superadmin can see all)
        window._userBranch = (u.branch || '').trim();
        const branchSel = document.getElementById('filterBranch');
        if (window._userBranch) {
          branchSel.value = window._userBranch;
          branchSel.disabled = true;
        }
        loadReport();
      } catch { window.location.replace('/login.html'); }
    })();
    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.replace('/login.html');
    }
  </script>

  <div class="container-lg py-4">

    <!-- Header -->
    <div class="card shadow-sm mb-4">
      <div class="page-header app-topbar">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 app-topbar-inner py-1">
          <div>
            <h5 class="mb-0"><i class="fas fa-recycle me-2"></i>รายงานเศษเหล็กที่ทิ้งแล้ว</h5>
            <small class="opacity-75">ดูน้ำหนักเศษเหล็กแต่ละประเภทที่บันทึกสถานที่ทิ้งแล้ว</small>
          </div>
          <div class="d-flex align-items-center gap-2 hdr-actions flex-wrap app-nav-actions">
            <span class="app-page-chip"><i class="fas fa-recycle"></i>หน้ารายงานทิ้ง</span>
            <a href="/selling.html" class="btn btn-warning btn-sm app-nav-btn" title="บันทึกการขายออก">
              <i class="fas fa-coins"></i><span class="btn-label ms-1">ขายออก</span>
            </a>
            <a href="/history.html" class="btn btn-outline-light btn-sm app-nav-btn" title="ประวัติเข้า-ออกเหล็ก">
              <i class="fas fa-exchange-alt"></i><span class="btn-label ms-1">ประวัติ</span>
            </a>
            <a href="/dashboard.html" class="btn btn-outline-light btn-sm app-nav-btn" title="Dashboard">
              <i class="fas fa-chart-line"></i><span class="btn-label ms-1">แดชบอร์ด</span>
            </a>
            <span class="app-user-chip" id="userInfo"><i class="fas fa-user-tie"></i>กำลังโหลด...</span>
            <button class="btn btn-outline-light btn-sm app-nav-btn" onclick="logout()" title="ออกจากระบบ">
              <i class="fas fa-sign-out-alt"></i><span class="btn-label ms-1">ออกจากระบบ</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="card-body border-bottom py-2">
        <div class="d-flex flex-wrap gap-2 align-items-end filter-row">
          <div>
            <label class="form-label small mb-1">สาขา</label>
            <select class="form-select form-select-sm" id="filterBranch" style="width:auto;min-width:110px">
              <option value="">ทุกสาขา</option>
              <option value="Y5">Y5</option>
              <option value="Y8">Y8</option>
              <option value="Y11">Y11</option>
            </select>
          </div>
          <div>
            <label class="form-label small mb-1">ตั้งแต่วันที่</label>
            <input type="date" class="form-control form-control-sm" id="filterDateFrom">
          </div>
          <div>
            <label class="form-label small mb-1">ถึงวันที่</label>
            <input type="date" class="form-control form-control-sm" id="filterDateTo">
          </div>
          <button class="btn btn-success btn-sm align-self-end" onclick="loadReport()">
            <i class="fas fa-search me-1"></i>ค้นหา
          </button>
          <button class="btn btn-outline-secondary btn-sm align-self-end" onclick="clearFilter()">
            <i class="fas fa-times me-1"></i>ล้าง
          </button>
        </div>
      </div>

      <!-- KPI Summary -->
      <div class="card-body border-bottom" id="kpiSection">
        <div class="text-center text-muted py-3">
          <div class="spinner-border spinner-border-sm me-2"></div>กำลังโหลด...
        </div>
      </div>
    </div>

    <!-- Breakdown + Location side-by-side -->
    <div class="row g-3 mb-4">
      <div class="col-lg-7">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <p class="section-label"><i class="fas fa-layer-group me-1"></i>น้ำหนักรายประเภท</p>
            <div id="typeSection">
              <div class="text-center text-muted py-3">
                <div class="spinner-border spinner-border-sm"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <p class="section-label"><i class="fas fa-map-marker-alt me-1"></i>น้ำหนักรายจุดทิ้ง</p>
            <div id="locationSection">
              <div class="text-center text-muted py-3">
                <div class="spinner-border spinner-border-sm"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent completed list -->
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
          <p class="section-label mb-0"><i class="fas fa-list me-1"></i>รายการที่ทิ้งแล้ว (ล่าสุด 50 รายการ)</p>
          <span class="badge bg-success" id="subCountBadge">–</span>
        </div>
        <div id="subList">
          <div class="text-center text-muted py-3">
            <div class="spinner-border spinner-border-sm"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Detail Modal -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable modal-lg">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title fw-bold" id="detailTitle">รายละเอียด</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-2 p-sm-3" id="detailBody">
          <div class="text-center py-4">
            <div class="spinner-border text-success"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Image viewer -->
  <div class="modal fade" id="imgModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-body p-0 text-center bg-dark">
          <img id="imgSrc" src="" class="img-fluid" style="max-height:80vh">
        </div>
        <div class="modal-footer"><button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">ปิด</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/nav-unified.js"></script>
  <script>
    const TYPE_LABELS = {
      thin_1: 'เศษลวดหัวแบ่ง', thin_2: 'สายแพ็คเหล็ก', thin_3: 'เศษลวดปลอก',
      thin_4: 'ลวดผูกเหล็กรัดลวดปลอก',
      thick_1: 'เศษเหล็กโดเวล',
      thick_2: 'เหล็กรูปพรรณเศษชิ้นส่วนเครื่องจักร/เศษเหล็กเพลท',
      special_1: 'เศษเหล็กแผ่นจากการตัดเพลทเครื่องตัดพลาสม่า',
    };
    const TYPE_GROUP = {
      thin_1: 'thin', thin_2: 'thin', thin_3: 'thin', thin_4: 'thin',
      thick_1: 'thick', thick_2: 'thick',
      special_1: 'special',
    };
    const GROUP_META = {
      thin: { label: 'เหล็กบาง', cls: 'thin', icon: 'fa-compress-alt', color: '#084298', bg: '#e7f3ff' },
      thick: { label: 'เหล็กหนา', cls: 'thick', icon: 'fa-expand-alt', color: '#7c4d00', bg: '#fff3e0' },
      special: { label: 'เหล็กหนาพิเศษ', cls: 'special', icon: 'fa-star', color: '#880e4f', bg: '#fce4ec' },
    };

    async function loadReport() {
      const branch = document.getElementById('filterBranch').value;
      const dateFrom = document.getElementById('filterDateFrom').value;
      const dateTo = document.getElementById('filterDateTo').value;

      const params = new URLSearchParams();
      if (branch) params.set('branch', branch);
      if (dateFrom) params.set('dateFrom', dateFrom);
      if (dateTo) params.set('dateTo', dateTo);

      const loading = `<div class="text-center text-muted py-3"><div class="spinner-border spinner-border-sm me-1"></div>กำลังโหลด...</div>`;
      document.getElementById('kpiSection').innerHTML = loading;
      document.getElementById('typeSection').innerHTML = loading;
      document.getElementById('locationSection').innerHTML = loading;
      document.getElementById('subList').innerHTML = loading;

      try {
        const res = await fetch('/api/managerial/report?' + params.toString());
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'error');
        renderKPI(data);
        renderTypes(data);
        renderLocations(data);
        renderSubList(data.recent || []);
      } catch (err) {
        const errHtml = `<div class="alert alert-danger py-2 small">${esc(err.message)}</div>`;
        ['kpiSection', 'typeSection', 'locationSection', 'subList'].forEach(id =>
          document.getElementById(id).innerHTML = errHtml
        );
      }
    }

    function clearFilter() {
      // Branch is locked — do not clear it
      if (!window._userBranch) document.getElementById('filterBranch').value = '';
      document.getElementById('filterDateFrom').value = '';
      document.getElementById('filterDateTo').value = '';
      loadReport();
    }

    function renderKPI(data) {
      const { total, weightByGroup } = data;
      const fmt = w => Number(w).toLocaleString('th-TH', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
      document.getElementById('kpiSection').innerHTML = `
    <div class="row g-2">
      <div class="col-6 col-md-3">
        <div class="kpi-card border text-center" style="background:#f0fdf4">
          <div class="kpi-num text-success">${total.submissions.toLocaleString()}</div>
          <div class="kpi-label"><i class="fas fa-check-circle me-1 text-success"></i>รายการเสร็จสิ้น</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="kpi-card border text-center" style="background:#f8f9fa">
          <div class="kpi-num text-dark">${fmt(total.weight)}</div>
          <div class="kpi-label"><i class="fas fa-weight-hanging me-1"></i>รวมทั้งหมด (กก.)</div>
        </div>
      </div>
      <div class="col-4 col-md-2">
        <div class="kpi-card border text-center" style="background:#e7f3ff">
          <div class="kpi-num" style="color:#084298">${fmt(weightByGroup.thin)}</div>
          <div class="kpi-label" style="color:#084298">เหล็กบาง (กก.)</div>
        </div>
      </div>
      <div class="col-4 col-md-2">
        <div class="kpi-card border text-center" style="background:#fff3e0">
          <div class="kpi-num" style="color:#7c4d00">${fmt(weightByGroup.thick)}</div>
          <div class="kpi-label" style="color:#7c4d00">เหล็กหนา (กก.)</div>
        </div>
      </div>
      <div class="col-4 col-md-2">
        <div class="kpi-card border text-center" style="background:#fce4ec">
          <div class="kpi-num" style="color:#880e4f">${fmt(weightByGroup.special)}</div>
          <div class="kpi-label" style="color:#880e4f">หนาพิเศษ (กก.)</div>
        </div>
      </div>
    </div>`;
    }

    function renderTypes(data) {
      const { byType } = data;
      if (!byType || byType.length === 0) {
        document.getElementById('typeSection').innerHTML = '<p class="text-muted small">ไม่มีข้อมูล</p>';
        return;
      }
      const totalW = byType.reduce((s, r) => s + r.weight, 0);
      const fmt = w => Number(w).toLocaleString('th-TH', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

      // Group by group
      const groups = { thin: [], thick: [], special: [] };
      byType.forEach(r => {
        const g = TYPE_GROUP[r.type] || 'thin';
        groups[g].push(r);
      });

      let html = '';
      for (const [gKey, gItems] of Object.entries(groups)) {
        if (gItems.length === 0) continue;
        const meta = GROUP_META[gKey];
        const gTotal = gItems.reduce((s, r) => s + r.weight, 0);
        const pct = totalW > 0 ? Math.round(gTotal / totalW * 100) : 0;
        html += `
      <div class="grp-hdr ${meta.cls}">
        <span><i class="fas ${meta.icon} me-1"></i>${meta.label}</span>
        <span>${fmt(gTotal)} กก. <small class="opacity-75">(${pct}%)</small></span>
      </div>
      <div class="grp-body">`;
        gItems.forEach(r => {
          const rPct = totalW > 0 ? (r.weight / totalW * 100).toFixed(1) : 0;
          html += `<div class="type-row">
        <span class="text-truncate me-2" style="max-width:65%">${esc(r.label)}</span>
        <span class="tw">${fmt(r.weight)} กก.</span>
      </div>`;
        });
        html += `</div>`;
      }
      document.getElementById('typeSection').innerHTML = html;
    }

    function renderLocations(data) {
      const { byLocation } = data;
      if (!byLocation || byLocation.length === 0) {
        document.getElementById('locationSection').innerHTML = '<p class="text-muted small">ไม่มีข้อมูล</p>';
        return;
      }
      const maxW = Math.max(...byLocation.map(r => r.weight), 1);
      const fmt = w => Number(w).toLocaleString('th-TH', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
      let html = '';
      byLocation.forEach(r => {
        const pct = Math.round(r.weight / maxW * 100);
        html += `
      <div class="loc-bar-wrap">
        <div class="loc-bar-label">
          <span class="text-truncate me-2" style="max-width:75%">${esc(r.location)}</span>
          <span class="fw-semibold text-success">${fmt(r.weight)} กก.</span>
        </div>
        <div style="background:#e9ecef;border-radius:5px;height:10px">
          <div class="loc-bar" style="width:${pct}%"></div>
        </div>
      </div>`;
      });
      document.getElementById('locationSection').innerHTML = html;
    }

    function renderSubList(list) {
      document.getElementById('subCountBadge').textContent = list.length + ' รายการ';
      if (list.length === 0) {
        document.getElementById('subList').innerHTML = '<div class="text-center text-muted py-3"><i class="fas fa-inbox fa-2x mb-2 d-block"></i>ไม่มีข้อมูล</div>';
        return;
      }
      const fmt = w => Number(w).toLocaleString('th-TH', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
      const rows = list.map(s => {
        const dt = s.disposalSubmittedAt
          ? new Date(s.disposalSubmittedAt).toLocaleString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit' })
          : '–';
        return `
      <div class="sub-item" onclick="openDetail('${s.id}')">
        <div class="d-flex justify-content-between align-items-start gap-2">
          <div style="min-width:0;flex:1">
            <span class="sub-id">${s.id.substring(0, 8).toUpperCase()}…</span>
            <div class="fw-semibold" style="font-size:.88rem;line-height:1.3">${esc(s.collectorName)}
              <span class="text-muted fw-normal">— สาขา ${esc(s.branch)}</span>
            </div>
            <div class="text-muted" style="font-size:.78rem">
              <i class="fas fa-map-marker-alt me-1 text-success"></i>${esc(s.disposalLocation)}
            </div>
            <div class="text-muted" style="font-size:.75rem">
              <i class="far fa-clock me-1"></i>${dt}
            </div>
          </div>
          <div class="text-end flex-shrink-0">
            <div class="fw-bold text-success">${fmt(s.totalWeight)} กก.</div>
            <span class="badge bg-success rounded-pill px-2" style="font-size:.7rem">เสร็จสิ้น</span>
          </div>
        </div>
      </div>`;
      }).join('');
      document.getElementById('subList').innerHTML = `<div class="border rounded">${rows}</div>`;
    }

    async function openDetail(id) {
      document.getElementById('detailTitle').textContent = 'กำลังโหลด...';
      document.getElementById('detailBody').innerHTML = '<div class="text-center py-4"><div class="spinner-border text-success"></div></div>';
      bootstrap.Modal.getOrCreateInstance(document.getElementById('detailModal')).show();
      try {
        const res = await fetch(`/api/submissions/${encodeURIComponent(id)}`);
        const s = await res.json();
        if (!res.ok) throw new Error(s.error || 'error');
        document.getElementById('detailTitle').textContent = `${s.collectorName} — สาขา ${s.branch}`;
        renderDetail(s);
      } catch (err) {
        document.getElementById('detailBody').innerHTML = `<div class="alert alert-danger">${esc(err.message)}</div>`;
      }
    }

    function renderDetail(s) {
      const totalWeight = (s.items || []).reduce((sum, it) => sum + (it.weight || 0), 0);
      const fmt = w => Number(w).toLocaleString('th-TH', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

      // Breakdown by group
      const groups = { thin: { items: [], total: 0 }, thick: { items: [], total: 0 }, special: { items: [], total: 0 } };
      (s.items || []).forEach(it => {
        const g = TYPE_GROUP[it.scrapType] || 'thin';
        groups[g].items.push(it);
        groups[g].total += it.weight || 0;
      });

      let bdHtml = '';
      for (const [gKey, gData] of Object.entries(groups)) {
        if (gData.items.length === 0) continue;
        const meta = GROUP_META[gKey];
        bdHtml += `
      <div class="mb-2">
        <div class="grp-hdr ${meta.cls}"><span><i class="fas ${meta.icon} me-1"></i>${meta.label}</span><span>${fmt(gData.total)} กก.</span></div>
        <div class="grp-body">`;
        gData.items.forEach(it => {
          bdHtml += `<div class="type-row">
        <span>${esc(TYPE_LABELS[it.scrapType] || it.scrapType)}</span>
        <span class="tw">${fmt(it.weight)} กก.</span>
      </div>`;
        });
        bdHtml += `</div></div>`;
      }

      const thumbHtml = (fn, lbl) => fn
        ? `<div class="d-inline-block text-center me-1">
        <img src="/uploads/${esc(fn)}" style="max-height:70px;border-radius:4px;border:1px solid #ccc;cursor:zoom-in"
          onclick="viewImg('/uploads/${esc(fn)}')">
        <div class="small text-muted" style="font-size:.65rem">${lbl}</div>
       </div>`
        : '';

      const itemCards = (s.items || []).map((it, i) => `
    <div style="background:#f8f9fa;border:1px solid #dee2e6;border-radius:8px;padding:.6rem .8rem;margin-bottom:.5rem;font-size:.85rem">
      <div class="d-flex justify-content-between mb-1">
        <span class="fw-semibold">#${i + 1} ${esc(it.scrapArea || '–')}</span>
        <span class="fw-bold text-success">${fmt(it.weight)} กก.</span>
      </div>
      <div class="text-muted small">${esc(TYPE_LABELS[it.scrapType] || it.scrapType)}</div>
      ${it.bringer ? `<div class="text-muted small"><i class="fas fa-user me-1"></i>${esc(it.bringer)}</div>` : ''}
      ${(it.ocrPhoto || it.weighingPhoto) ? `<div class="mt-1">${thumbHtml(it.ocrPhoto, 'OCR')}${thumbHtml(it.weighingPhoto, 'รูปถ่าย')}</div>` : ''}
    </div>`).join('');

      const dt = s.disposalSubmittedAt ? new Date(s.disposalSubmittedAt).toLocaleString('th-TH') : '–';

      document.getElementById('detailBody').innerHTML = `
    <dl class="row small mb-3">
      <dt class="col-5 text-muted">สาขา</dt>       <dd class="col-7">${esc(s.branch)}</dd>
      <dt class="col-5 text-muted">ผู้เก็บ</dt>    <dd class="col-7">${esc(s.collectorName)}</dd>
      <dt class="col-5 text-muted">แผนก</dt>        <dd class="col-7">${esc(s.department || '–')}</dd>
      <dt class="col-5 text-muted">อนุมัติโดย</dt> <dd class="col-7">${esc(s.approvedBy || '–')}</dd>
      <dt class="col-5 text-muted">สถานที่ทิ้ง</dt><dd class="col-7 fw-semibold text-success">${esc(s.disposalLocation || '–')}</dd>
      <dt class="col-5 text-muted">บันทึกเมื่อ</dt><dd class="col-7">${dt}</dd>
      <dt class="col-5 text-muted">รวมน้ำหนัก</dt><dd class="col-7 fw-bold text-success">${fmt(totalWeight)} กก.</dd>
    </dl>

    ${s.disposalPhoto ? `
      <div class="mb-3">
        <p class="small text-muted mb-1"><i class="fas fa-camera me-1"></i>รูปถ่ายสถานที่ทิ้ง</p>
        <img src="/uploads/${esc(s.disposalPhoto)}" style="max-height:120px;border-radius:6px;border:1px solid #ccc;cursor:zoom-in"
          onclick="viewImg('/uploads/${esc(s.disposalPhoto)}')">
      </div>` : ''}

    <p class="section-label"><i class="fas fa-layer-group me-1"></i>สรุปรายประเภท</p>
    ${bdHtml || '<p class="text-muted small">ไม่มีข้อมูล</p>'}

    <p class="section-label mt-3"><i class="fas fa-list me-1"></i>รายการ (${(s.items || []).length} รายการ)</p>
    ${itemCards}`;
    }

    function viewImg(src) {
      document.getElementById('imgSrc').src = src;
      bootstrap.Modal.getOrCreateInstance(document.getElementById('imgModal')).show();
    }

    function esc(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>
</body>

</html>
